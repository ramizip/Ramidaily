<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 라미 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F6F4EF;--card:#fff;--border:#EBEBEB;
  --text:#4A3728;--sub:#7A6858;--muted:#B0A090;
  --clay:#D4724A;--clay-l:#FEF0EA;--clay-b:#F0C4A8;
  --sage:#5A9E72;--sage-l:#EBF7F0;
  --purple:#7E6BBE;--purple-l:#F0EDFB;
}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

.hub{width:100%;max-width:400px;}

/* 헤더 */
.hub-header{text-align:center;margin-bottom:32px;}
.hub-brand{font-family:'Gowun Dodum',serif;font-size:28px;color:var(--clay);margin-bottom:6px;}
.hub-date{font-size:13px;color:var(--muted);margin-bottom:4px;}
.hub-msg{font-size:13px;color:var(--sub);line-height:1.6;}

/* 카드 */
.hub-cards{display:flex;flex-direction:column;gap:12px;}
.hub-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:20px 22px;text-decoration:none;color:var(--text);
  display:flex;align-items:center;gap:16px;
  transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.hub-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08);border-color:var(--clay-b);}
.hub-icon{font-size:32px;flex-shrink:0;}
.hub-info{flex:1;}
.hub-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.hub-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.hub-arrow{font-size:18px;color:var(--muted);flex-shrink:0;}

/* 컬러 포인트 */
.card-daily{border-left:4px solid var(--clay);}
.card-daily .hub-title{color:var(--clay);}
.card-morning{border-left:4px solid var(--sage);}
.card-morning .hub-title{color:var(--sage);}
.card-content{border-left:4px solid var(--purple);}
.card-content .hub-title{color:var(--purple);}

/* 하단 */
.hub-footer{text-align:center;margin-top:28px;font-size:11px;color:var(--muted);}
</style>
</head>
<body>

<div class="hub">
  <div class="hub-header">
    <div class="hub-brand">🌿 라미 허브</div>
    <div class="hub-date" id="dateEl"></div>
    <div class="hub-msg" id="msgEl"></div>
  </div>

  <div class="hub-cards">
    <a href="./lami-daily-master.html" class="hub-card card-daily">
      <span class="hub-icon">📋</span>
      <div class="hub-info">
        <div class="hub-title">라미 데일리</div>
        <div class="hub-desc">오늘 할일 · 타임블록 · 루틴 체크<br>주간 · 월간 · 수익화 · 육아맘</div>
      </div>
      <span class="hub-arrow">›</span>
    </a>

    <a href="./lami-morning.html" class="hub-card card-morning">
      <span class="hub-icon">🌅</span>
      <div class="hub-info">
        <div class="hub-title">라미 모닝</div>
        <div class="hub-desc">아침 브리핑 · 오늘의 집중 포인트<br>매일 10시 시작 전 확인</div>
      </div>
      <span class="hub-arrow">›</span>
    </a>

    <a href="./june-content-plan.html" class="hub-card card-content">
      <span class="hub-icon">🔥</span>
      <div class="hub-info">
        <div class="hub-title">6월 콘텐츠 플랜</div>
        <div class="hub-desc">주차별 체크리스트 · 채널별 아이디어<br>프롬프트 키트 · 채널 전략</div>
      </div>
      <span class="hub-arrow">›</span>
    </a>
  </div>

  <div class="hub-footer" id="footerEl">오늘도 차근차근, 할 수 있어요 🌿</div>
</div>

<script>
var now = new Date();
var days = ['일','월','화','수','목','금','토'];
document.getElementById('dateEl').textContent =
  now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+days[now.getDay()]+')';

var msgs = [
  '완벽하지 않아도 괜찮아요. 오늘도 열어봤다는 것만으로 충분해요 🌿',
  '작은 것 하나 완성하는 게 크게 계획만 세우는 것보다 강해요.',
  '육아하면서 이걸 해내고 있다는 것 자체가 대단한 거예요 💪',
  '콘텐츠 하나가 쌓이면 자산이 돼요. 오늘 하나, 내일 하나.',
  '매일 조금씩이 결국 3억을 만들어요. 멈추지 말아요.',
  '잘 안 되는 날도 괜찮아요. 중요한 건 다시 여는 것이에요.',
  '수진씨는 이미 많은 걸 갖고 있어요. 지금 필요한 건 행동이에요.',
];
document.getElementById('msgEl').textContent = msgs[now.getDay() % msgs.length];
</script>
</body>
</html>
