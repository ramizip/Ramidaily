<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>라미그로우 아침 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f4ef;--card:#fff;--dark:#161210;
  --coral:#d4623a;--coral-l:#f5ddd0;--peach:#f0c9a8;
  --mid:#7a5c48;--light:#b09a8a;--border:#e8ddd5;
}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--dark);min-height:100vh}

/* HEADER */
.hdr{background:var(--dark);padding:26px 20px 18px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(212,98,58,.22) 0%,transparent 70%)}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-brand{font-size:10px;letter-spacing:4px;color:var(--coral);margin-bottom:4px}
.hdr-date{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#fff;line-height:.9;letter-spacing:2px}
.hdr-date span{color:var(--coral)}
.hdr-day{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:3px;margin-top:5px}
.hdr-right{text-align:right}
.hdr-time{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--coral);letter-spacing:2px;line-height:1}
.hdr-greet{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:1px}

/* STRIP */
.strip{background:var(--coral);padding:9px 20px;display:flex;align-items:center;justify-content:space-between}
.strip-wk{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:2px}
.strip-theme{font-size:13px;font-weight:700;color:#fff}

/* MAIN */
main{padding:14px 16px 90px;max-width:480px;margin:0 auto}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* MISSION CARD */
.mission{background:var(--dark);border-radius:16px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.mission::before{content:'';position:absolute;bottom:-25px;right:-25px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(212,98,58,.25) 0%,transparent 70%)}
.m-label{font-size:9px;letter-spacing:3px;color:var(--coral);margin-bottom:5px}
.m-theme{font-size:19px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:4px}
.m-hook{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:12px;font-style:italic}
.m-chs{display:flex;gap:5px;flex-wrap:wrap}
.m-ch{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}

/* PROG */
.prog-row{display:flex;gap:8px;margin-bottom:12px}
.pbox{flex:1;background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
.pbox-n{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--coral);line-height:1}
.pbox-l{font-size:10px;color:var(--light);letter-spacing:1px;margin-top:1px}
.pbar{height:4px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.pbar-f{height:100%;background:var(--coral);border-radius:2px;transition:width .4s}

/* TIME BLOCKS */
.time-block{margin-bottom:14px}
.tb-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tb-time{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--coral);background:rgba(212,98,58,.1);padding:3px 9px;border-radius:6px}
.tb-desc{font-size:11px;color:var(--light)}

/* TASKS */
.task{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;background:var(--card);border-radius:10px;margin-bottom:5px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.task:active{transform:scale(.98)}
.task.done{opacity:.4}
.task.done .task-txt{text-decoration:line-through}
.t-c{width:19px;height:19px;min-width:19px;border-radius:50%;border:2px solid var(--coral-l);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s;margin-top:1px}
.task.done .t-c{background:var(--coral);border-color:var(--coral);color:#fff}
.task-txt{font-size:12.5px;line-height:1.4;flex:1}
.task-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;flex-shrink:0;margin-top:1px;letter-spacing:.5px}

/* SECTION TITLE */
.sec{font-size:10px;letter-spacing:3px;color:var(--light);font-weight:700;margin:4px 0 9px}

/* PROMPT */
.p-card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:9px;overflow:hidden}
.p-top{display:flex;align-items:center;gap:9px;padding:13px 15px 10px;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s}
.p-top.open{border-bottom-color:var(--border)}
.p-ico{font-size:19px;flex-shrink:0}
.p-info{flex:1}
.p-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;padding:2px 6px;border-radius:5px;margin-bottom:3px;display:inline-block}
.p-name{font-size:13px;font-weight:700}
.p-arr{font-size:11px;color:var(--light);transition:transform .2s;flex-shrink:0}
.p-arr.open{transform:rotate(180deg)}
.p-body{display:none;padding:0 14px 13px}
.p-body.open{display:block}
.pbox{background:#f0ece6;border-radius:9px;padding:12px;font-size:11.5px;color:#4a3828;line-height:1.8;white-space:pre-wrap;word-break:break-word;margin-top:9px;border:1px solid var(--border)}
.copy-btn{display:block;width:100%;margin-top:7px;padding:10px;background:var(--coral);border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;letter-spacing:1px;transition:all .2s}
.copy-btn.ok{background:#2e7d32}

/* CALENDAR */
.cal-day{background:var(--card);border-radius:11px;padding:12px 15px;margin-bottom:6px;border:1px solid var(--border);display:flex;align-items:center;gap:11px;cursor:pointer}
.cal-day.today{background:var(--dark);border-color:var(--coral)}
.cal-badge{width:36px;height:36px;border-radius:9px;background:var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.cal-day.today .cal-badge{background:var(--coral)}
.cb-dn{font-size:8px;font-weight:700;color:var(--light)}
.cal-day.today .cb-dn{color:rgba(255,255,255,.7)}
.cb-dd{font-size:15px;font-weight:900;color:var(--dark);line-height:1}
.cal-day.today .cb-dd{color:#fff}
.cal-info{flex:1}
.ci-theme{font-size:13px;font-weight:700;color:var(--dark)}
.cal-day.today .ci-theme{color:#fff}
.ci-hook{font-size:11px;color:var(--light);margin-top:2px}
.cal-day.today .ci-hook{color:rgba(255,255,255,.5)}
.cal-pct{font-size:11px;font-weight:700;color:var(--light);flex-shrink:0}
.cal-day.today .cal-pct{color:var(--coral)}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);display:flex;border-top:1px solid rgba(255,255,255,.07);z-index:100}
.nb{flex:1;padding:11px 4px 15px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.3);font-size:9px;font-family:'Noto Sans KR',sans-serif;font-weight:700;letter-spacing:.5px;transition:all .15s}
.nb.active{color:var(--coral)}
.nb-ico{font-size:19px;line-height:1}

/* TAG COLORS */
.t-reel{background:#fde8ee;color:#c0294a}
.t-story{background:#fff0e0;color:#c87d2a}
.t-thread{background:#ede9ff;color:#5b4fcf}
.t-blog{background:#ddeeff;color:#2d7fc1}
.t-shorts{background:#ffecec;color:#c0392b}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-brand">🌱 라미그로우</div>
      <div class="hdr-day" id="weekday">MONDAY</div>
      <div class="hdr-date" id="dateNum">6<span>.</span>9</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-time" id="clock">--:--</div>
      <div class="hdr-greet" id="greet">좋은 아침 ☀️</div>
    </div>
  </div>
</div>
<div class="strip">
  <div class="strip-wk" id="stripWk">–</div>
  <div class="strip-theme" id="stripTheme">로딩 중...</div>
</div>

<main>
  <!-- TODAY VIEW -->
  <div class="view active" id="view-today">

      <div class="m-chs" id="mChs"></div>

      <div class="pbox"><div class="pbox-n" id="pTotal">0</div><div class="pbox-l">전체</div><div class="pbar"><div class="pbar-f" style="width:100%;background:var(--border)"></div></div></div>
      <div class="pbox"><div class="pbox-n" id="pLeft">0</div><div class="pbox-l">남음</div><div class="pbar"><div class="pbar-f" id="pLeft2" style="width:100%;background:var(--coral-l)"></div></div></div>
    </div>

    <!-- TIME BLOCKS -->
    <div class="time-block">
      <div class="tb-head"><div class="tb-time">🌅 오전</div><div class="tb-desc">Threads · 스토리</div></div>
      <div id="tasks-am"></div>
    </div>
    <div class="time-block">
      <div class="tb-head"><div class="tb-time">☀️ 오후</div><div class="tb-desc">블로그 작성</div></div>
      <div id="tasks-pm"></div>
    </div>
    <div class="time-block">
      <div class="tb-head"><div class="tb-time">🌙 밤</div><div class="tb-desc">릴스 · 쇼츠 · 소통</div></div>
      <div id="tasks-night"></div>
    </div>
  </div>

  <!-- PROMPT VIEW -->
  <div class="view" id="view-prompt">
    <div class="sec">오늘 주제 자동 적용 프롬프트</div>

    <div class="p-card">
      <div class="p-top" onclick="toggleP(this)">
        <div class="p-ico">⚡</div>

        <div class="p-arr">▼</div>
      </div>
      <div class="p-body"><div class="pbox" id="p-master"></div><button class="copy-btn" onclick="doCopy('p-master',this)">📋 복사 → ChatGPT 붙여넣기</button></div>
    </div>

    <div class="p-card">
      <div class="p-top" onclick="toggleP(this)">
        <div class="p-ico">🎬</div>
        <div class="p-info"><div class="p-tag t-reel">릴스 스크립트</div><div class="p-name">공감 · 브이로그 릴스 뽑기</div></div>
        <div class="p-arr">▼</div>
      </div>
      <div class="p-body"><div class="pbox" id="p-reel"></div><button class="copy-btn" onclick="doCopy('p-reel',this)">📋 복사하기</button></div>
    </div>

    <div class="p-card">
      <div class="p-top" onclick="toggleP(this)">
        <div class="p-ico">🧵</div>
        <div class="p-info"><div class="p-tag t-thread">스레드 3개</div><div class="p-name">공감 스레드 바로 뽑기</div></div>
        <div class="p-arr">▼</div>
      </div>
      <div class="p-body"><div class="pbox" id="p-thread"></div><button class="copy-btn" onclick="doCopy('p-thread',this)">📋 복사하기</button></div>
    </div>

    <div class="p-card">
      <div class="p-top" onclick="toggleP(this)">
        <div class="p-ico">✍️</div>
        <div class="p-info"><div class="p-tag t-blog">블로그</div><div class="p-name">현실기록 + AI 블로그 작성</div></div>
        <div class="p-arr">▼</div>
      </div>
      <div class="p-body"><div class="pbox" id="p-blog"></div><button class="copy-btn" onclick="doCopy('p-blog',this)">📋 복사하기</button></div>
    </div>

    <div class="p-card">
      <div class="p-top" onclick="toggleP(this)">
        <div class="p-ico">📸</div>
        <div class="p-info"><div class="p-tag t-story">스토리 5개</div><div class="p-name">오늘 스토리 구성 기획</div></div>
        <div class="p-arr">▼</div>
      </div>
      <div class="p-body"><div class="pbox" id="p-story"></div><button class="copy-btn" onclick="doCopy('p-story',this)">📋 복사하기</button></div>
    </div>
  </div>

  <!-- CALENDAR VIEW -->
  <div class="view" id="view-cal">
    <div class="sec">6월 라미그로우 전체 플랜</div>
    <div id="calList"></div>
  </div>
</main>

<nav class="nav">
  <button class="nb active" onclick="showView('today',this)"><div class="nb-ico">☀️</div>오늘</button>
  <button class="nb" onclick="showView('prompt',this)"><div class="nb-ico">⚡</div>프롬프트</button>
  <button class="nb" onclick="showView('cal',this)"><div class="nb-ico">🗓</div>캘린더</button>
</nav>

    pm:[{ch:"블로그",t:"육아맘이 다시 일 시작하는 과정"}],
    night:[{ch:"릴스",t:"포기하고 싶었던 날 (감성 브이로그)"},{ch:"쇼츠",t:"쇼츠 업로드"},{ch:"스토리",t:"③ 그래도 다시 한 이유 공유"},{ch:"스토리",t:"④ 릴스 공유"},{ch:"스토리",t:"⑤ '여러분도 그런 날 있었나요?' 공감"}]},

  "2026-06-30":{week:"4주차",goal:"6월 마무리",theme:"그래도 다시 하는 이유",hook:"6월 총정리 + 7월 예고",chs:["릴스","스토리","스레드","블로그","쇼츠"],
    am:[{ch:"스레드",t:"① 6월 한 달 매일 올렸다 (결산)"},{ch:"스레드",t:"② 나중에 아이들이 자랑스러워했으면 좋겠다"},{ch:"스레드",t:"③ 7월에도 계속합니다"},{ch:"스토리",t:"① 6월 숫자 공개 (릴스 수, 블로그 수)"},{ch:"스토리",t:"② 가장 반응 좋았던 콘텐츠 Top3"}],
    pm:[{ch:"블로그",t:"콘텐츠 꾸준히 만드는 방법 (6월 회고)"}],
    night:[{ch:"릴스",t:"그래도 다시 하는 이유 (6월 마무리 감성)"},{ch:"쇼츠",t:"쇼츠 업로드"},{ch:"스토리",t:"③ 7월 목표 공개 + 기대 유도"},{ch:"스토리",t:"④ 팔로워 모두에게 감사 인사"},{ch:"스토리",t:"⑤ 릴스 공유"}]}
};

const CH_CLS={릴스:"t-reel",스토리:"t-story",스레드:"t-thread",블로그:"t-blog",쇼츠:"t-shorts"};
const CH_COL={릴스:"#c0294a",스토리:"#c87d2a",스레드:"#5b4fcf",블로그:"#2d7fc1",쇼츠:"#c0392b"};
const DAYS_KR=['일','월','화','수','목','금','토'];
const DAYS_EN=['SUN','MON','TUE','WED','THU','FRI','SAT'];

let curKey=todayKey();
let doneMap={};

function todayKey(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function loadDone(k){try{return JSON.parse(localStorage.getItem('lg_done_'+k)||'{}')}catch{return{}}}
function saveDone(k,o){try{localStorage.setItem('lg_done_'+k,JSON.stringify(o))}catch{}}

// clock
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  const h=n.getHours();
  document.getElementById('greet').textContent=h<12?'좋은 아침 ☀️':h<18?'화이팅 💪':'수고했어요 🌙';
}
setInterval(tick,1000);tick();

// date display
(function(){
  const n=new Date();
  document.getElementById('weekday').textContent=DAYS_EN[n.getDay()];
  document.getElementById('dateNum').innerHTML=`${n.getMonth()+1}<span>.</span>${n.getDate()}`;
})();

// all tasks for a day
function allTasks(d){return [...(d.am||[]),...(d.pm||[]),...(d.night||[])]}

function renderToday(){
  const d=PLAN[curKey];
  doneMap=loadDone(curKey);
  if(!d){
    document.getElementById('stripWk').textContent='–';
    document.getElementById('stripTheme').textContent='오늘은 플랜 없는 날';
    document.getElementById('mTheme').textContent='🌿 쉬는 날!';
    document.getElementById('mHook').textContent='오늘은 쉬어도 돼요';
    document.getElementById('mChs').innerHTML='';
    ['tasks-am','tasks-pm','tasks-night'].forEach(id=>document.getElementById(id).innerHTML='');
    setStats(0,0);
    renderPrompts(null);
    return;
  }
  document.getElementById('stripWk').textContent=d.week;
  document.getElementById('stripTheme').textContent=d.theme;
  document.getElementById('mTheme').textContent=d.theme;
  document.getElementById('mHook').textContent=d.hook;
  document.getElementById('mChs').innerHTML=d.chs.map(c=>`<span class="m-ch ${CH_CLS[c]}">${c}</span>`).join('');

  renderTaskBlock('tasks-am',d.am||[]);
  renderTaskBlock('tasks-pm',d.pm||[]);
  renderTaskBlock('tasks-night',d.night||[]);

  const all=allTasks(d);
  const done=all.filter((_,i)=>doneMap[i]).length;
  setStats(done,all.length);
  renderPrompts(d);
}

function renderTaskBlock(elId,tasks){
  const el=document.getElementById(elId);
  if(!tasks.length){el.innerHTML='<div style="padding:8px 13px;font-size:11px;color:var(--light);">이 시간대 할 일 없어요 😊</div>';return;}
  // need global index across all time blocks
  const d=PLAN[curKey];
  const all=allTasks(d);
  el.innerHTML=tasks.map(t=>{
    const gi=all.indexOf(t);
    const done=!!doneMap[gi];
    return`<div class="task${done?' done':''}" onclick="toggleTask(${gi})">
      <div class="t-c">${done?'✓':''}</div>
      <div class="task-txt">${t.t}</div>
      <span class="task-tag ${CH_CLS[t.ch]}">${t.ch}</span>
    </div>`;
  }).join('');
}

function toggleTask(gi){
  doneMap[gi]=!doneMap[gi];
  saveDone(curKey,doneMap);
  renderToday();
}

function setStats(done,total){
  const left=Math.max(0,total-done);
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pDone').textContent=done;
  document.getElementById('pTotal').textContent=total;
  document.getElementById('pLeft').textContent=left;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLeft2').style.width=(100-pct)+'%';
}

function renderPrompts(d){
  const topic=d?d.theme:'[오늘 주제]';
  const wk=d?d.week:'–';
  const goal=d?d.goal:'–';
  document.getElementById('p-master').textContent=
`나는 두 아이를 키우는 육아맘이야.
디자인 경력이 있고 AI 공부를 시작하면서 수익화를 준비 중이야.
계정명: 라미그로우 (사람 브랜딩 — 공감·성장기 콘텐츠)

오늘 주제: ${topic}
오늘 주차: ${wk}
이번 주 목표: ${goal}

아래 4가지 만들어줘:
1. 📱 릴스 스크립트 (7~15초, 첫 1초 후킹, 자막 형식)
2. 🧵 스레드 3개 (3줄 이내, 날것 느낌, 공감 유발)
3. ✍️ 블로그 제목 3개 (SEO 키워드형)
4. 📸 스토리 5개 구성 (각 한 줄)

조건:
- 완벽한 전문가 NO → 현실 육아맘 YES
- 공감·감정·성장기 위주
- 스레드는 진짜 생각 털어놓는 느낌`;

  document.getElementById('p-reel').textContent=
`라미그로우 인스타 릴스 스크립트 써줘.

주제: ${topic}
포지션: 두 아이 육아맘 + AI 공부 중 + 성장 기록

조건:
- 7~13초 자막 분량
- 첫 1초: 멈추게 만드는 후킹 1줄
- 중간: 현실 공감 2~3줄
- 마지막: 저장·공유 유도 한 방 문장
- 날것 감정, 완벽한 문장 NO
- BGM 분위기 추천도 포함`;

  document.getElementById('p-thread').textContent=
`라미그로우 Threads 글 3개 써줘.

주제 연관: ${topic}
나: 두 아이 육아맘, AI 공부 시작, 다시 일하고 싶음

조건:
- 각 3줄 이내
- 잘 쓴 글 느낌 NO → 진짜 생각 털어놓는 느낌
- 줄바꿈 리듬감
- 보는 사람이 "맞아 나도..." 하게
- 이모지 최대 2개
- 3개가 각각 다른 감정 포인트`;

  document.getElementById('p-blog').textContent=
`라미그로우 블로그 글 써줘. (네이버·구글 검색 타겟)

주제: ${topic}
독자: 집에서 돈 벌고 싶은 육아맘
내 시점: 나도 해보면서 기록하는 느낌

형식:
- SEO 제목 (검색될 것 같은)
- 도입: 공감으로 시작 3~4줄
- 소제목 3~4개 + 실용 정보
- 중간에 내 실제 경험 1~2문장
- 마무리: 같이 해보자는 느낌
- 800~1200자`;

  document.getElementById('p-story').textContent=
`라미그로우 인스타 스토리 5개 구성해줘.

오늘 릴스 주제: ${topic}
이번 주 목표: ${goal}

조건:
- 1~5번 각각 뭘 올릴지 한 줄
- 릴스 공유 반드시 1개 포함
- 인터랙션(투표·질문) 1개 포함
- 나머지는 일상·감정·정보 섞기
- 업로드 순서 고려한 배치
- 각 스토리 텍스트 문구도 제안`;
}

// calendar
function renderCal(){
  const el=document.getElementById('calList');
  const keys=Object.keys(PLAN).sort();
  const weeks={};
  keys.forEach(k=>{
    const w=PLAN[k].week;
    if(!weeks[w])weeks[w]=[];
    weeks[w].push(k);
  });
  let html='';
  Object.keys(weeks).forEach(w=>{
    html+=`<div class="sec">${w}</div>`;
    weeks[w].forEach(k=>{
      const d=PLAN[k];
      const dt=new Date(k+'T00:00:00');
      const isToday=k===curKey;
      const done=Object.values(loadDone(k)).filter(Boolean).length;
      const total=allTasks(d).length;
      html+=`<div class="cal-day${isToday?' today':''}" onclick="jumpTo('${k}')">
        <div class="cal-badge"><div class="cb-dn">${DAYS_KR[dt.getDay()]}</div><div class="cb-dd">${dt.getDate()}</div></div>
        <div class="cal-info"><div class="ci-theme">${d.theme}</div><div class="ci-hook">${d.hook}</div></div>
        <div class="cal-pct">${done}/${total}</div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function jumpTo(k){
  curKey=k;
  doneMap=loadDone(k);
  renderToday();
  showView('today',document.querySelector('.nb'));
}

function showView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='cal')renderCal();
}

function toggleP(top){
  const body=top.nextElementSibling;
  const arr=top.querySelector('.p-arr');
  const isOpen=body.classList.contains('open');
  document.querySelectorAll('.p-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.p-arr').forEach(a=>a.classList.remove('open'));
  top.classList.remove('open');
  document.querySelectorAll('.p-top').forEach(t=>t.classList.remove('open'));
  if(!isOpen){body.classList.add('open');arr.classList.add('open');top.classList.add('open');}
}

function doCopy(id,btn){
  const txt=document.getElementById(id).textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent='✅ 복사 완료!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 복사 → ChatGPT 붙여넣기';btn.classList.remove('ok');},2000);
  }).catch(()=>{
    const r=document.createRange();r.selectNode(document.getElementById(id));
    window.getSelection().removeAllRanges();window.getSelection().addRange(r);
    document.execCommand('copy');window.getSelection().removeAllRanges();
    btn.textContent='✅ 복사 완료!';setTimeout(()=>{btn.textContent='📋 복사 → ChatGPT 붙여넣기';},2000);
  });
}

renderToday();
</script>
