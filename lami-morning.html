<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>라미그로우 아침 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #f7f3ee;
  --card: #ffffff;
  --dark: #16120d;
  --coral: #d4623a;
  --coral-light: #f0c4b0;
  --peach: #f5ddd0;
  --mid: #7a5c48;
  --light: #b09a8a;
  --border: #e8ddd5;
  --insta: #d4294a;
  --thread: #5b4fcf;
  --blog: #2d7fc1;
  --story: #c87d2a;
  --shorts: #c0392b;
}

body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--dark);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--dark);
  padding: 28px 20px 20px;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  right: -40px; top: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,98,58,0.25) 0%, transparent 70%);
}
.h-date-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.h-date {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  color: white;
  line-height: 0.9;
  letter-spacing: 2px;
}
.h-date span { color: var(--coral); }
.h-weekday {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 3px;
  margin-top: 6px;
}
.h-time-box {
  text-align: right;
}
.h-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--coral);
  letter-spacing: 2px;
  line-height: 1;
}
.h-greeting {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
  letter-spacing: 1px;
}

/* TODAY BADGE */
.today-strip {
  background: var(--coral);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ts-week { font-size:11px; font-weight:700; color:rgba(255,255,255,0.7); letter-spacing:2px; }
.ts-theme { font-size:13px; font-weight:700; color:white; }

/* ── MAIN ── */
main { padding: 16px 16px 100px; max-width: 480px; margin: 0 auto; }

/* TODAY THEME CARD */
.theme-card {
  background: var(--dark);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.theme-card::before {
  content: '';
  position: absolute;
  bottom: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,98,58,0.3) 0%, transparent 70%);
}
.tc-label { font-size:9px; letter-spacing:3px; color:var(--coral); margin-bottom:6px; }
.tc-theme { font-size:20px; font-weight:900; color:white; line-height:1.2; margin-bottom:6px; }
.tc-hook {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size:13px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 14px;
}
.tc-channels {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tc-ch {
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

/* PROGRESS ROW */
.prog-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.prog-box {
  flex: 1;
  background: var(--card);
  border-radius: 14px;
  padding: 14px;
  border: 1px solid var(--border);
  text-align: center;
}
.pb-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--coral);
  line-height: 1;
}
.pb-label { font-size: 10px; color: var(--light); letter-spacing: 1px; margin-top: 2px; }
.pb-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.pb-fill { height: 100%; background: var(--coral); border-radius: 2px; transition: width 0.4s ease; }

/* SECTION TITLE */
.sec-title {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--light);
  font-weight: 700;
  margin-bottom: 10px;
  margin-top: 6px;
}

/* TASK LIST */
.task-group { margin-bottom: 12px; }
.tg-head {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 7px;
}
.tg-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tg-name { font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--mid); }

.task {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  background: var(--card);
  border-radius: 11px;
  margin-bottom: 5px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.task:active { transform: scale(0.98); }
.task.done { opacity: 0.4; }
.task.done .task-text { text-decoration: line-through; }

.t-circle {
  width: 20px; height: 20px; min-width: 20px;
  border-radius: 50%;
  border: 2px solid var(--coral-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent;
  transition: all 0.15s;
  margin-top: 1px;
}
.task.done .t-circle { background: var(--coral); border-color: var(--coral); color: white; }
.task-text { font-size: 13px; line-height: 1.4; flex: 1; }
.task-badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 7px;
  flex-shrink: 0; margin-top: 2px;
  letter-spacing: 0.5px;
}

/* PROMPT SECTION */
.prompt-card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}
.pc-top {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.pc-icon { font-size: 20px; flex-shrink: 0; }
.pc-info { flex: 1; }
.pc-tag {
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  padding: 2px 7px; border-radius: 6px; margin-bottom: 4px; display: inline-block;
}
.pc-name { font-size: 13px; font-weight: 700; }
.pc-arrow { font-size: 12px; color: var(--light); transition: transform 0.2s; flex-shrink: 0; }
.pc-arrow.open { transform: rotate(180deg); }

.pc-body { display: none; padding: 0 14px 14px; }
.pc-body.open { display: block; }

.prompt-box {
  background: #f0ece6;
  border-radius: 10px;
  padding: 13px;
  font-size: 12px;
  color: #4a3828;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  margin-top: 10px;
  border: 1px solid var(--border);
}
.prompt-fill { color: var(--coral); font-weight: 700; }

.copy-btn {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 11px;
  background: var(--coral);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.copy-btn:active { transform: scale(0.97); }
.copy-btn.done-copy { background: #2e7d32; }

/* NAV BAR */
.nav-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--dark);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.07);
  z-index: 100;
  max-width: 100%;
}
.nav-btn {
  flex: 1;
  padding: 12px 4px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: none;
  color: rgba(255,255,255,0.3);
  font-size: 9px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.nav-btn.active { color: var(--coral); }
.nav-icon { font-size: 20px; line-height: 1; }

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* OFF DAY */
.offday-card {
  background: var(--card);
  border-radius: 18px;
  padding: 28px 20px;
  text-align: center;
  border: 1px solid var(--border);
  margin-bottom: 14px;
}
.od-emoji { font-size: 44px; margin-bottom: 10px; }
.od-title { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
.od-sub { font-size: 13px; color: var(--mid); line-height: 1.6; }

/* COLOR TAGS */
.insta-tag { background:#fde8ee; color:var(--insta); }
.thread-tag { background:#ede9ff; color:var(--thread); }
.blog-tag { background:#ddeeff; color:var(--blog); }
.story-tag { background:#fff0e0; color:var(--story); }
.shorts-tag { background:#ffecec; color:var(--shorts); }

@media(max-width:380px){
  .h-date { font-size:44px; }
  .tc-theme { font-size:17px; }
  .task-text { font-size:12px; }
}
</style>
</head>

  <div class="h-date-row">
    <div>
      <div class="h-weekday" id="weekday">MONDAY</div>

    </div>
  </div>
</div>

<div class="today-strip" id="todayStrip">

</div>

<main>

    <div class="prompt-card">

      </div>
    </div>

    <!-- REEL -->
    <div class="prompt-card">
      <div class="pc-top" onclick="togglePrompt(this)">
        <div class="pc-icon">🎬</div>
        <div class="pc-info">
          <div class="pc-tag insta-tag">릴스 스크립트</div>
          <div class="pc-name">저장되는 릴스 자막 뽑기</div>
        </div>
        <div class="pc-arrow">▼</div>
      </div>
      <div class="pc-body">
        <div class="prompt-box" id="p-reel"></div>
        <button class="copy-btn" onclick="copyP('p-reel',this)">📋 복사하기</button>
      </div>
    </div>

    <!-- THREAD -->
    <div class="prompt-card">
      <div class="pc-top" onclick="togglePrompt(this)">
        <div class="pc-icon">🧵</div>
        <div class="pc-info">
          <div class="pc-tag thread-tag">스레드 3개</div>
          <div class="pc-name">오늘 스레드 바로 뽑기</div>
        </div>
        <div class="pc-arrow">▼</div>
      </div>
      <div class="pc-body">
        <div class="prompt-box" id="p-thread"></div>
        <button class="copy-btn" onclick="copyP('p-thread',this)">📋 복사하기</button>
      </div>
    </div>

    <!-- BLOG -->
    <div class="prompt-card">
      <div class="pc-top" onclick="togglePrompt(this)">
        <div class="pc-icon">✍️</div>
        <div class="pc-info">
          <div class="pc-tag blog-tag">블로그</div>

        </div>
        <div class="pc-arrow">▼</div>
      </div>
      <div class="pc-body">
        <div class="prompt-box" id="p-blog"></div>
        <button class="copy-btn" onclick="copyP('p-blog',this)">📋 복사하기</button>
      </div>
    </div>

    <!-- STORY -->

      <div class="pc-top" onclick="togglePrompt(this)">
        <div class="pc-icon">📸</div>
        <div class="pc-info">
          <div class="pc-tag story-tag">스토리 5개</div>

        </div>
        <div class="pc-arrow">▼</div>
      </div>
      <div class="pc-body">
        <div class="prompt-box" id="p-story"></div>
        <button class="copy-btn" onclick="copyP('p-story',this)">📋 복사하기</button>
      </div>
    </div>
  </div>

  <!-- VIEW: CALENDAR -->
  <div class="view" id="view-calendar">
    <div class="sec-title">6월 전체 주제 보기</div>
    <div id="calList"></div>
  </div>

</main>

<nav class="nav-bar">
  <button class="nav-btn active" onclick="showView('today',this)">
    <div class="nav-icon">☀️</div>오늘
  </button>
  <button class="nav-btn" onclick="showView('prompt',this)">

  </button>
  <button class="nav-btn" onclick="showView('calendar',this)">
    <div class="nav-icon">🗓</div>캘린더
  </button>
</nav>

// ── HELPERS ─────────────────────────────────────────
const CH_COLOR = {
  "릴스":   "insta-tag",
  "스토리": "story-tag",
  "스레드": "thread-tag",
  "블로그": "blog-tag",
  "쇼츠":   "shorts-tag"
};

function todayKey() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function makeDoneKey(dateKey) { return `lami_done_${dateKey}`; }

function loadDone(dateKey) {
  try { return JSON.parse(localStorage.getItem(makeDoneKey(dateKey)) || '[]'); }
  catch { return []; }
}
function saveDone(dateKey, arr) {
  try { localStorage.setItem(makeDoneKey(dateKey), JSON.stringify(arr)); } catch {}
}

// ── CLOCK ────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  const hour = now.getHours();
  let g = hour < 12 ? "좋은 아침이에요 ☀️" : hour < 18 ? "오늘도 화이팅 💪" : "수고했어요 🌙";
  document.getElementById('greeting').textContent = g;
}
setInterval(updateClock, 1000);
updateClock();

// ── RENDER TODAY ──────────────────────────────────────
let currentDateKey = todayKey();
let doneSet = new Set(loadDone(currentDateKey));

function renderToday() {
  const key = currentDateKey;
  const day = PLAN[key];

  if (!day) {
    // No plan for this day
    document.getElementById('todayStrip').style.background = '#7a5c48';
    document.getElementById('weekLabel').textContent = '–';
    document.getElementById('dayTheme').textContent = '오늘은 플랜 없는 날이에요';
    document.getElementById('tcTheme').textContent = '🎉 쉬는 날!';
    document.getElementById('tcHook').textContent = '오늘은 쉬어도 돼요';
    document.getElementById('tcChannels').innerHTML = '';
    document.getElementById('taskList').innerHTML =
      `<div class="offday-card"><div class="od-emoji">🌿</div><div class="od-title">오늘은 계획된 업로드가 없어요</div><div class="od-sub">충분히 쉬고 내일 다시 시작해요!</div></div>`;
    document.getElementById('doneCount').textContent = '–';
    document.getElementById('totalCount').textContent = '–';
    document.getElementById('leftCount').textContent = '–';
    renderPrompts(null);
    return;
  }

  document.getElementById('weekLabel').textContent = day.week;
  document.getElementById('dayTheme').textContent = day.theme;
  document.getElementById('tcTheme').textContent = day.theme;
  document.getElementById('tcHook').textContent = day.hook;

  // channels
  const chEl = document.getElementById('tcChannels');
  chEl.innerHTML = day.channels.map(c =>
    `<span class="tc-ch ${CH_COLOR[c]||''}">${c}</span>`
  ).join('');

  // tasks
  const list = document.getElementById('taskList');
  const groups = {};
  day.tasks.forEach((t,i) => {
    if (!groups[t.ch]) groups[t.ch] = [];
    groups[t.ch].push({...t, idx:i});
  });

  let html = '';
  Object.keys(groups).forEach(ch => {
    html += `<div class="task-group">
      <div class="tg-head">
        <div class="tg-dot" style="background:${chColor(ch)}"></div>
        <div class="tg-name">${ch}</div>
      </div>`;
    groups[ch].forEach(t => {
      const done = doneSet.has(t.idx);
      html += `<div class="task${done?' done':''}" onclick="toggleTask(${t.idx})">
        <div class="t-circle">${done?'✓':''}</div>
        <div class="task-text">${t.text}</div>
        <span class="task-badge ${CH_COLOR[t.ch]||''}">${t.ch}</span>
      </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;

  updateProgress(day.tasks.length);
  renderPrompts(day);
}

function chColor(ch) {
  const map = { "릴스":"#d4294a","스토리":"#c87d2a","스레드":"#5b4fcf","블로그":"#2d7fc1","쇼츠":"#c0392b" };
  return map[ch] || '#7a5c48';
}

function toggleTask(idx) {
  if (doneSet.has(idx)) doneSet.delete(idx);
  else doneSet.add(idx);
  saveDone(currentDateKey, [...doneSet]);
  renderToday();
}

function updateProgress(total) {
  const done = doneSet.size;
  const left = Math.max(0, total - done);
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('leftCount').textContent = left;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('leftFill').style.width = (100 - pct) + '%';
}

// ── CALENDAR ─────────────────────────────────────────
function renderCalendar() {
  const el = document.getElementById('calList');
  const weeks = { "1주차":[], "2주차":[], "3주차":[], "4주차":[] };

  const allDays = Object.keys(PLAN).sort();
  allDays.forEach(k => {
    const d = PLAN[k];
    const w = d.week.split('/')[0].trim();
    if (weeks[w]) weeks[w].push({key:k, ...d});
    else {
      const wk = d.week.includes('1주차') ? "1주차" :
                 d.week.includes('2주차') ? "2주차" :
                 d.week.includes('3주차') ? "3주차" : "4주차";
      if (!weeks[wk]) weeks[wk] = [];
      weeks[wk].push({key:k, ...d});
    }
  });

  let html = '';
  ['1주차','2주차','3주차','4주차'].forEach(wk => {
    if (!weeks[wk] || !weeks[wk].length) return;
    html += `<div class="sec-title">${wk}</div>`;
    weeks[wk].forEach(day => {
      const dt = new Date(day.key + 'T00:00:00');
      const dayNames = ['일','월','화','수','목','금','토'];
      const isToday = day.key === currentDateKey;
      const done = loadDone(day.key).length;
      const total = day.tasks.length;
      html += `
      <div style="background:${isToday?'var(--dark)':'var(--card)'}; border-radius:12px; padding:13px 16px; margin-bottom:7px; border:1px solid ${isToday?'var(--coral)':'var(--border)'}; display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="jumpToDate('${day.key}')">
        <div style="width:38px; height:38px; border-radius:10px; background:${isToday?'var(--coral)':'var(--border)'}; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0;">
          <div style="font-size:9px; color:${isToday?'rgba(255,255,255,0.7)':'var(--light)'}; font-weight:700;">${dayNames[dt.getDay()]}</div>
          <div style="font-size:16px; font-weight:900; color:${isToday?'white':'var(--dark)'}; line-height:1;">${dt.getDate()}</div>
        </div>
        <div style="flex:1;">
          <div style="font-size:13px; font-weight:700; color:${isToday?'white':'var(--dark)'};">${day.theme}</div>
          <div style="font-size:11px; color:${isToday?'rgba(255,255,255,0.5)':'var(--light)'}; margin-top:2px;">${day.hook}</div>
        </div>
        <div style="font-size:11px; color:${done===total&&total>0?'var(--coral)':'var(--light)'}; font-weight:700; flex-shrink:0;">${done}/${total}</div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

function jumpToDate(key) {
  currentDateKey = key;
  doneSet = new Set(loadDone(key));
  renderToday();
  renderCalendar();
  showView('today', document.querySelector('.nav-btn'));
}

// ── NAVIGATION ────────────────────────────────────────
function showView(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'calendar') renderCalendar();
}

function togglePrompt(top) {
  const body = top.nextElementSibling;
  const arrow = top.querySelector('.pc-arrow');
  const open = body.classList.contains('open');
  document.querySelectorAll('.pc-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.pc-arrow').forEach(a => a.classList.remove('open'));
  if (!open) { body.classList.add('open'); arrow.classList.add('open'); }
}

function copyP(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 복사 완료!';
    btn.classList.add('done-copy');
    setTimeout(() => {
      btn.textContent = '📋 복사하고 ChatGPT에 붙여넣기';
      btn.classList.remove('done-copy');
    }, 2000);
  }).catch(() => {
    const r = document.createRange();
    r.selectNode(document.getElementById(id));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    btn.textContent = '✅ 복사 완료!';
    setTimeout(() => { btn.textContent = '📋 복사하고 ChatGPT에 붙여넣기'; }, 2000);
  });
}
